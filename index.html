<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Terminal Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; height: 100%; background: #000000; }
      #root { height: 100%; }

      .btn-new-terminal {
        background: #0A84FF !important;
        border: none !important;
        color: #fff !important;
        font-weight: 700 !important;
        transition: opacity 0.15s ease, transform 0.15s ease !important;
      }
      .btn-new-terminal:hover {
        opacity: 0.85;
        transform: translateY(-1px);
      }
      .btn-new-terminal:active {
        transform: translateY(0);
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
